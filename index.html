<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cool-X Messaging Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="theme-light">
    <section id="splash" class="screen active splash-screen">
      <div class="orb"></div>
      <div class="logo-wrap">
        <div class="logo">CX</div>
        <h1>Cool-X</h1>
        <p>Fast. Private. Beautiful.</p>
      </div>
    </section>

    <section id="auth" class="screen auth-screen">
      <div class="card glass">
        <h2>Welcome back</h2>
        <p>Sign in with your phone number.</p>
        <label>Phone Number</label>
        <input type="tel" id="phoneInput" placeholder="+1 555 010 1234" />
        <button id="sendOtp" class="btn btn-primary">Send OTP</button>
        <div id="otpBlock" class="otp-block hidden">
          <label>Enter OTP</label>
          <input type="text" id="otpInput" placeholder="123456" maxlength="6" />
          <button id="verifyOtp" class="btn">Verify & Continue</button>
        </div>
      </div>
    </section>

    <section id="main" class="screen app-shell">
      <header class="topbar glass">
        <div>
          <h3 id="screenTitle">Chats</h3>
          <small id="subTitle">2,413 online</small>
        </div>
        <div class="top-actions">
          <input id="globalSearch" placeholder="Search messages, media, files" />
          <button id="themeToggle" class="icon-btn" title="Toggle theme">🌗</button>
        </div>
      </header>

      <main class="content" id="screenContainer">
        <section data-screen="chats" class="pane active">
          <div class="chat-list" id="chatList"></div>
        </section>

        <section data-screen="groups" class="pane">
          <div class="panel glass">
            <h4>Groups</h4>
            <button id="newGroup" class="btn">+ Create Group</button>
            <div id="groupCards" class="cards"></div>
          </div>
        </section>

        <section data-screen="channels" class="pane">
          <div class="panel glass">
            <h4>Channels</h4>
            <button id="newChannel" class="btn">+ Create Channel</button>
            <div id="channelCards" class="cards"></div>
          </div>
        </section>

        <section data-screen="calls" class="pane">
          <div class="panel glass">
            <h4>Recent Calls</h4>
            <ul id="callList" class="call-list"></ul>
          </div>
        </section>

        <section data-screen="settings" class="pane">
          <div class="panel glass settings-grid">
            <h4>Settings</h4>
            <label class="setting-item">Passcode Lock <input type="checkbox" checked></label>
            <label class="setting-item">Biometric Lock <input type="checkbox"></label>
            <label class="setting-item">Last Seen Visibility
              <select><option>Everyone</option><option>Contacts</option><option>Nobody</option></select>
            </label>
            <label class="setting-item">Theme Accent
              <select><option>Blue</option><option>Indigo</option><option>Teal</option></select>
            </label>
            <label class="setting-item">Language
              <select><option>English</option><option>Español</option><option>हिंदी</option></select>
            </label>
          </div>
        </section>
      </main>

      <button id="fab" class="fab">＋</button>

      <nav class="bottom-nav glass">
        <button data-tab="chats" class="nav-btn active">💬<span>Chats</span></button>
        <button data-tab="groups" class="nav-btn">👥<span>Groups</span></button>
        <button data-tab="channels" class="nav-btn">📢<span>Channels</span></button>
        <button data-tab="calls" class="nav-btn">📞<span>Calls</span></button>
        <button data-tab="settings" class="nav-btn">⚙️<span>Settings</span></button>
      </nav>
    </section>

    <aside id="chatDrawer" class="chat-drawer">
      <header class="drawer-head glass">
        <button id="backBtn" class="icon-btn">←</button>
        <div>
          <h4 id="chatTitle">Ava Wilson</h4>
          <small id="chatStatus">typing...</small>
        </div>
      </header>

      <div id="messageArea" class="messages"></div>

      <div class="typing">●●●</div>

      <footer class="composer glass">
        <button class="icon-btn" title="Emoji">😀</button>
        <input id="messageInput" placeholder="Message" />
        <button id="voiceBtn" class="icon-btn" title="Hold for voice">🎤</button>
        <button id="sendBtn" class="icon-btn send">➤</button>
      </footer>
    </aside>

    <dialog id="creatorDialog" class="creator-dialog">
      <form method="dialog" class="glass">
        <h4 id="creatorTitle">Create New</h4>
        <input id="creatorName" placeholder="Name" />
        <textarea id="creatorDesc" placeholder="Description"></textarea>
        <menu>
          <button value="cancel" class="btn">Cancel</button>
          <button id="creatorSave" value="default" class="btn btn-primary">Save</button>
        </menu>
      </form>
    </dialog>
  </div>

  <script src="script.js"></script>
</body>
</html>
